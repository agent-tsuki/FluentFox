# docker-compose.test.yml — isolated test database
# Used by: make test / make test-coverage / CI
# No persistence — data is destroyed after each run.

services:

  postgres:
    container_name: fluentfox-postgres-test
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     fluentfox
      POSTGRES_PASSWORD: fluentfox_test
      POSTGRES_DB:       fluentfox_test
    ports:
      - "5431:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U fluentfox -d fluentfox_test"]
      interval: 3s
      timeout:  3s
      retries:  10
    networks:
      - fluentfox-test-net

networks:
  fluentfox-test-net:
    driver: bridge
