version: "3.9"

# Used by CI and go test ./... — isolated test database, no persistence.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fluentfox
      POSTGRES_PASSWORD: fluentfox_test
      POSTGRES_DB: fluentfox_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluentfox -d fluentfox_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # No persistence — data is destroyed after test run.
