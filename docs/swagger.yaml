basePath: /
definitions:
  auth.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      native_lang:
        type: string
      password:
        minLength: 8
        type: string
      phone_number:
        type: string
      user_name:
        type: string
    required:
    - email
    - first_name
    - native_lang
    - password
    type: object
  github_com_fluentfox_api_pkg_response.ErrorBody:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  github_com_fluentfox_api_pkg_response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_fluentfox_api_pkg_response.ErrorBody'
    type: object
host: localhost:8080
info:
  contact: {}
  description: Japanese language learning API.
  title: FluentFox API
  version: "1.0"
paths:
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and sends a verification email
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_fluentfox_api_pkg_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_fluentfox_api_pkg_response.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/github_com_fluentfox_api_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_fluentfox_api_pkg_response.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    description: Enter "Bearer <your_access_token>"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
