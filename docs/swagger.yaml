        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_fluentfox_api_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_fluentfox_api_pkg_response.ErrorResponse'
